<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Click and Drag</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <div class="cube cube1">01</div>
    <div class="cube cube2">02</div>
    <div class="cube cube3">03</div>
    <div class="cube cube4">04</div>
    <div class="cube cube5">05</div>
    <div class="cube cube6">06</div>
    <div class="cube cube7">07</div>
    <div class="cube cube8">08</div>
    <div class="cube cube9">09</div>
    <div class="cube cube10">10</div>
    <div class="cube cube11">11</div>
    <div class="cube cube12">12</div>
    <div class="cube cube13">13</div>
    <div class="cube cube14">14</div>
    <div class="cube cube15">15</div>
    <div class="cube cube16">16</div>
    <div class="cube cube17">17</div>
    <div class="cube cube18">18</div>
    <div class="cube cube19">19</div>
    <div class="cube cube20">20</div>
    <div class="cube cube21">21</div>
    <div class="cube cube22">22</div>
    <div class="cube cube23">23</div>
    <div class="cube cube24">24</div>
    <div class="cube cube25">25</div>
  </div>

<script>
	const container = document.querySelector('.container');
const cubes = document.querySelectorAll('.cube');

let activeCube = null;
let offsetX = 0;
let offsetY = 0;

cubes.forEach(cube => {
  cube.style.position = 'absolute';

  cube.addEventListener('mousedown', (e) => {
    activeCube = cube;

    const rect = cube.getBoundingClientRect();

    offsetX = e.clientX - rect.left;
    offsetY = e.clientY - rect.top;
  });
});

document.addEventListener('mousemove', (e) => {
  if (!activeCube) return;

  const containerRect = container.getBoundingClientRect();

  let left = e.clientX - containerRect.left - offsetX;
  let top = e.clientY - containerRect.top - offsetY;

  left = Math.max(
    0,
    Math.min(left, containerRect.width - activeCube.offsetWidth)
  );

  top = Math.max(
    0,
    Math.min(top, containerRect.height - activeCube.offsetHeight)
  );

  activeCube.style.left = left + 'px';
  activeCube.style.top = top + 'px';
});

document.addEventListener('mouseup', () => {
  activeCube = null;
}); 
</script>

  </body>
</html>
